name: Build and Release

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    name: Preflight - suggest secrets & generate tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Print recommended secrets and guidance
        run: |
          echo "Recommended repository secrets for this workflow:"
          echo " - GPG_SIGNING_KEY: (optional) ASCII-armored GPG private key for signing release artifacts"
          echo " - CODE_SIGN_CERT: (optional) Windows code-signing certificate (base64)"
          echo " - STORAGE_TOKEN: (optional) token for private artifact stores"
          echo
          echo "To add a secret: repository Settings → Secrets and variables → Actions → New repository secret"

      - name: Generate Release Tag
        id: get_tag
        run: |
          SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
          TS=$(date -u +%Y.%m.%d.%H%M%S)
          echo "tag=v${TS}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Generated Tag: v${TS}-${SHORT_SHA}"

  build:
    name: Build (matrix)
    runs-on: ${{ matrix.os }}
    needs: preflight
    env:
      CODE_SIGN_CERT: ${{ secrets.CODE_SIGN_CERT }}
      CODE_SIGN_CERT_PASSWORD: ${{ secrets.CODE_SIGN_CERT_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            arch: amd64
            ext: .exe
            package: zip
          - os: ubuntu-22.04
            platform: Linux
            arch: amd64
            ext: ""
            package: tar.gz
          - os: ubuntu-latest
            platform: Linux-Legacy
            arch: amd64
            ext: ""
            package: tar.gz
          - os: ubuntu-24.04-arm
            platform: Linux
            arch: arm64
            ext: ""
            package: tar.gz
          - os: macos-latest
            platform: MacOS
            arch: arm64
            ext: ""
            package: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (Host, with pip cache)
        if: ${{ matrix.platform != 'Linux-Legacy' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Python (Host, no cache for Docker-based build)
        if: ${{ matrix.platform == 'Linux-Legacy' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Host)
        if: ${{ matrix.platform != 'Linux-Legacy' }}
        run: |
          pip install --upgrade pip
          pip install pyinstaller cython
          pip install -r requirements.txt
          pip check

      - name: Generate launcher entry files (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: powershell
        run: |
          @'
          from pathlib import Path
          Path("build_client_entry.py").write_text(
              "from client import main\n\nif __name__ == '__main__':\n    main()\n",
              encoding="utf-8",
          )
          Path("build_server_entry.py").write_text(
              "from server import main\n\nif __name__ == '__main__':\n    main()\n",
              encoding="utf-8",
          )
          Path("build_verify_extensions.py").write_text(
              "import importlib\n\nmodules = [\n    'client',\n    'server',\n    'dns_utils.ARQ',\n    'dns_utils.DnsPacketParser',\n    'dns_utils.DNSBalancer',\n    'dns_utils.compression',\n    'dns_utils.config_loader',\n    'dns_utils.DNS_ENUMS',\n]\n\nbad = []\nfor name in modules:\n    mod = importlib.import_module(name)\n    path = (getattr(mod, '__file__', '') or '').lower()\n    print(f'{name} -> {path}')\n    if not (path.endswith('.so') or path.endswith('.pyd')):\n        bad.append((name, path))\n\nif bad:\n    print('Expected compiled extension load, but got:')\n    for name, path in bad:\n        print(f'  {name}: {path}')\n    raise SystemExit(1)\n",
              encoding="utf-8",
          )
          '@ | python -

      - name: Generate launcher entry files (non-Windows)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          cat > build_client_entry.py <<'PY'
          from client import main

          if __name__ == "__main__":
              main()
          PY

          cat > build_server_entry.py <<'PY'
          from server import main

          if __name__ == "__main__":
              main()
          PY

          cat > build_verify_extensions.py <<'PY'
          import importlib

          modules = [
              "client",
              "server",
              "dns_utils.ARQ",
              "dns_utils.DnsPacketParser",
              "dns_utils.DNSBalancer",
              "dns_utils.compression",
              "dns_utils.config_loader",
              "dns_utils.DNS_ENUMS",
          ]

          bad = []
          for name in modules:
              mod = importlib.import_module(name)
              path = (getattr(mod, "__file__", "") or "").lower()
              print(f"{name} -> {path}")
              if not (path.endswith(".so") or path.endswith(".pyd")):
                  bad.append((name, path))

          if bad:
              print("Expected compiled extension load, but got:")
              for name, path in bad:
                  print(f"  {name}: {path}")
              raise SystemExit(1)
          PY

      - name: Prepare build directory (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: powershell
        run: |
          Remove-Item -LiteralPath dist -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path dist -Force | Out-Null

      - name: Prepare build directory (non-Windows)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          rm -rf dist || true
          mkdir -p dist

      - name: Compile Python modules to C extensions (Host)
        if: ${{ matrix.platform != 'Linux-Legacy' }}
        run: |
          python build_setup.py build_ext --inplace

      - name: Verify compiled modules are loaded (Host)
        if: ${{ matrix.platform != 'Linux-Legacy' }}
        run: |
          python build_verify_extensions.py

      - name: Build client (Host)
        if: ${{ matrix.platform != 'Linux-Legacy' }}
        run: |
          pyinstaller --onefile --icon=assets/masterdnsvpn.ico --name "MasterDnsVPN_Client_${{ matrix.platform }}_${{ matrix.arch }}" build_client_entry.py

      - name: Build server (Host)
        if: ${{ matrix.platform != 'Linux-Legacy' }}
        run: |
          pyinstaller --onefile --icon=assets/masterdnsvpn.ico --name "MasterDnsVPN_Server_${{ matrix.platform }}_${{ matrix.arch }}" build_server_entry.py

      - name: Build client & server (Linux-Legacy via Docker, with Cython)
        if: ${{ matrix.platform == 'Linux-Legacy' }}
        shell: bash
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            python:3.11-bullseye bash -c "
            set -euo pipefail
            apt-get update
            apt-get install -y --no-install-recommends build-essential
            pip install pyinstaller cython
            pip install -r requirements.txt
            pip check
            python build_setup.py build_ext --inplace
            python build_verify_extensions.py
            pyinstaller --onefile --icon=assets/masterdnsvpn.ico --name 'MasterDnsVPN_Client_${{ matrix.platform }}_${{ matrix.arch }}' build_client_entry.py
            pyinstaller --onefile --icon=assets/masterdnsvpn.ico --name 'MasterDnsVPN_Server_${{ matrix.platform }}_${{ matrix.arch }}' build_server_entry.py
            chown -R \$HOST_UID:\$HOST_GID dist/ build/ *.spec || true
            "

      - name: Bundle config templates with executables
        shell: bash
        run: |
          cp client_config.toml.simple dist/client_config.toml || true
          cp client_resolvers.simple.txt dist/client_resolvers.txt || true
          cp server_config.toml.simple dist/server_config.toml || true

      - name: Prepare smoke-test config (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: powershell
        run: |
          $path = "dist/client_config.toml"
          if (Test-Path $path) {
            $content = Get-Content $path -Raw
            $content = $content -replace 'ENCRYPTION_KEY\s*=\s*""', 'ENCRYPTION_KEY = "smoke-test-key"'
            Set-Content -Path $path -Value $content -Encoding UTF8
          }

      - name: Prepare smoke-test config (non-Windows)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          if [ -f dist/client_config.toml ]; then
            sed -i 's/^ENCRYPTION_KEY[[:space:]]*=[[:space:]]*""/ENCRYPTION_KEY = "smoke-test-key"/' dist/client_config.toml || true
          fi

      - name: Smoke test executables (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          Set-Location dist

          $clientBin = "MasterDnsVPN_Client_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"
          $serverBin = "MasterDnsVPN_Server_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"
          $targets = @($clientBin, $serverBin)

          foreach ($bin in $targets) {
            if (-not (Test-Path $bin)) {
              throw "Smoke test target not found: $bin"
            }

            Write-Host "Smoke testing $bin ..."
            $outFile = "$bin.smoke.out"
            $errFile = "$bin.smoke.err"
            $proc = Start-Process -FilePath ".\\$bin" -PassThru -NoNewWindow -RedirectStandardOutput $outFile -RedirectStandardError $errFile
            Start-Sleep -Seconds 5

            if ($proc.HasExited) {
              $code = $proc.ExitCode
              Write-Host "$bin exited early with code $code"
              if ($code -ne 0) {
                Write-Host "---- STDOUT ($bin) ----"
                if (Test-Path $outFile) { Get-Content $outFile }
                Write-Host "---- STDERR ($bin) ----"
                if (Test-Path $errFile) { Get-Content $errFile }
                throw "Smoke test failed for $bin with exit code $code"
              }
            } else {
              Stop-Process -Id $proc.Id -Force
              Wait-Process -Id $proc.Id -ErrorAction SilentlyContinue
              Write-Host "$bin stayed alive for 5s; terminated intentionally."
            }
          }

      - name: Smoke test executables (non-Windows)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist

          client_bin="MasterDnsVPN_Client_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"
          server_bin="MasterDnsVPN_Server_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"

          for bin in "$client_bin" "$server_bin"; do
            if [ ! -f "$bin" ]; then
              echo "Smoke test target not found: $bin" >&2
              exit 1
            fi

            chmod +x "$bin" || true
            echo "Smoke testing $bin ..."
            out_file="$bin.smoke.out"
            err_file="$bin.smoke.err"

            "./$bin" >"$out_file" 2>"$err_file" &
            pid=$!
            sleep 5

            if kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
              echo "$bin stayed alive for 5s; terminated intentionally."
            else
              set +e
              wait "$pid"
              code=$?
              set -e
              echo "$bin exited early with code $code"
              if [ "$code" -ne 0 ]; then
                echo "---- STDOUT ($bin) ----"
                cat "$out_file" || true
                echo "---- STDERR ($bin) ----"
                cat "$err_file" || true
                exit 1
              fi
            fi
          done

      - name: Package artifacts (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          Set-Location dist
          $platform = '${{ matrix.platform }}'
          $arch = '${{ matrix.arch }}'
          $ext = '${{ matrix.ext }}'
          $tag = '${{ needs.preflight.outputs.release_tag }}'
          $archUpper = $arch.ToUpper()

          $clientZipBase = "MasterDnsVPN_Client_${platform}_$archUpper"
          $serverZipBase = "MasterDnsVPN_Server_${platform}_$archUpper"

          $clientExeName = "${clientZipBase}_${tag}${ext}"
          $serverExeName = "${serverZipBase}_${tag}${ext}"

          $clientOrig = "MasterDnsVPN_Client_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"
          $serverOrig = "MasterDnsVPN_Server_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"

          if (Test-Path $clientOrig) {
            Rename-Item -Path $clientOrig -NewName $clientExeName -Force
          }
          if (Test-Path $serverOrig) {
            Rename-Item -Path $serverOrig -NewName $serverExeName -Force
          }

          Compress-Archive -Path $clientExeName,"client_config.toml","client_resolvers.txt" -DestinationPath "${clientZipBase}.zip" -Force
          Compress-Archive -Path $serverExeName,"server_config.toml" -DestinationPath "${serverZipBase}.zip" -Force

      - name: Package artifacts (non-Windows)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          ARCH_UPPER=$(echo "${{ matrix.arch }}" | tr '[:lower:]' '[:upper:]')
          PLATFORM="${{ matrix.platform }}"
          TAG="${{ needs.preflight.outputs.release_tag }}"

          CLIENT_ZIP_BASE="MasterDnsVPN_Client_${PLATFORM}_${ARCH_UPPER}"
          SERVER_ZIP_BASE="MasterDnsVPN_Server_${PLATFORM}_${ARCH_UPPER}"

          CLIENT_EXE_NAME="${CLIENT_ZIP_BASE}_${TAG}${{ matrix.ext }}"
          SERVER_EXE_NAME="${SERVER_ZIP_BASE}_${TAG}${{ matrix.ext }}"

          CLIENT_ORIG="MasterDnsVPN_Client_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"
          SERVER_ORIG="MasterDnsVPN_Server_${{ matrix.platform }}_${{ matrix.arch }}${{ matrix.ext }}"

          if [ -f "${CLIENT_ORIG}" ]; then
            mv "${CLIENT_ORIG}" "${CLIENT_EXE_NAME}" || true
          fi
          if [ -f "${SERVER_ORIG}" ]; then
            mv "${SERVER_ORIG}" "${SERVER_EXE_NAME}" || true
          fi

          CLIENT_ZIP="${CLIENT_ZIP_BASE}.zip"
          SERVER_ZIP="${SERVER_ZIP_BASE}.zip"
          CLIENT_TAR="${CLIENT_ZIP_BASE}.tar.gz"
          SERVER_TAR="${SERVER_ZIP_BASE}.tar.gz"

          CLIENT_TOML="client_config.toml"
          CLIENT_RESOLVERS="client_resolvers.txt"
          SERVER_TOML="server_config.toml"

          zip -j "${CLIENT_ZIP}" "${CLIENT_EXE_NAME}" "${CLIENT_TOML}" "${CLIENT_RESOLVERS}" || true
          tar -czf "${CLIENT_TAR}" "${CLIENT_EXE_NAME}" "${CLIENT_TOML}" "${CLIENT_RESOLVERS}" || true
          zip -j "${SERVER_ZIP}" "${SERVER_EXE_NAME}" "${SERVER_TOML}" || true
          tar -czf "${SERVER_TAR}" "${SERVER_EXE_NAME}" "${SERVER_TOML}" || true

      - name: Code sign Windows executables (optional)
        if: ${{ env.CODE_SIGN_CERT != '' && matrix.os == 'windows-latest' }}
        shell: powershell
        run: |
          Write-Host "Decoding CODE_SIGN_CERT to cert.pfx"
          [System.IO.File]::WriteAllBytes('cert.pfx', [Convert]::FromBase64String('${{ env.CODE_SIGN_CERT }}'))
          if (Test-Path 'cert.pfx') {
            $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
            if ($null -ne $signtool) {
              Write-Host "signtool found at $($signtool.Path). Signing files..."
              $files = Get-ChildItem -Path .\ -Filter "*Windows*amd64*${{ matrix.ext }}*" -Recurse -File
              foreach ($f in $files) {
                Write-Host "Signing $($f.FullName)"
                & $signtool.Path sign /f cert.pfx /p "${{ env.CODE_SIGN_CERT_PASSWORD }}" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $f.FullName
              }
            } else { Write-Host "signtool not found on runner; skipping Windows signing." }
          } else { Write-Host "cert.pfx not found after decode; skipping signing." }

      - name: Code sign macOS executables (optional)
        if: ${{ env.CODE_SIGN_CERT != '' && startsWith(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "Decoding CODE_SIGN_CERT to cert.pfx"
          echo "${{ env.CODE_SIGN_CERT }}" | base64 -d > cert.pfx
          if [ -f cert.pfx ]; then
            echo "Importing cert.pfx into login keychain (may require interactive access)"
            security import cert.pfx -k ~/Library/Keychains/login.keychain -P "${{ env.CODE_SIGN_CERT_PASSWORD }}" -T /usr/bin/codesign || true
            IDENTITY=$(security find-identity -v -p codesigning | head -n1 | awk -F '"' '{print $2}') || true
            if [ -n "$IDENTITY" ]; then
              echo "Found identity: $IDENTITY. Signing macOS binaries."
              for f in ./dist/*${{ matrix.platform }}*${{ matrix.arch }}_v*; do
                if [ -f "$f" ] && [[ "$f" != *.* ]]; then
                  codesign --sign "$IDENTITY" --options runtime --timestamp --force "$f" || true
                fi
              done
            else
              echo "No signing identity found; skipping codesign."
            fi
          else
            echo "cert.pfx not present; skipping macOS signing."
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: Create Release and attach artifacts
    runs-on: ubuntu-latest
    needs: [preflight, build]
    steps:
      - name: Checkout repository (fetch tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: List downloaded artifacts
        run: |
          echo "Contents of release_assets:" 
          ls -la release_assets || true
          echo "Recursive listing:" 
          find release_assets -maxdepth 3 -print || true

      - name: Build release notes body
        id: create_release
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = process.env.GITHUB_SHA;

            let prevTag = null;
            try {
              const latest = await github.rest.repos.getLatestRelease({ owner, repo });
              prevTag = latest.data.tag_name;
            } catch (e) {
              prevTag = null;
            }

            let commits = [];
            if (prevTag) {
              const comp = await github.rest.repos.compareCommits({ owner, repo, base: prevTag, head });
              commits = comp.data.commits || [];
            } else {
              const list = await github.rest.repos.listCommits({ owner, repo, sha: head, per_page: 250 });
              commits = list.data || [];
            }

            const prSet = new Map();
            const contributors = new Map();

            for (const c of commits) {
              const sha = c.sha;
              const author = (c.author && c.author.login) ? `@${c.author.login}` : (c.commit && c.commit.author && c.commit.author.name) || 'unknown';
              contributors.set(author, (contributors.get(author) || 0) + 1);
              try {
                const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
                for (const pr of prs.data) {
                  if (pr.merged_at) {
                    prSet.set(pr.number, { number: pr.number, title: pr.title, url: pr.html_url, user: pr.user ? `@${pr.user.login}` : '' });
                  }
                }
              } catch (e) {}
            }

            let body = `Automated release created by workflow run ${context.runId} for commit ${head}\n\n`;
            if (prevTag) body = `Changes since ${prevTag}:\n\n` + body;
            body += '### Commits\n';
            for (const c of commits.slice(-50)) {
              const msg = c.commit.message.split('\n')[0];
              body += `- ${msg} ([${c.sha.substring(0,7)}](https://github.com/${owner}/${repo}/commit/${c.sha}))\n`;
            }
            if (prSet.size > 0) {
              body += '\n### Merged PRs\n';
              for (const pr of prSet.values()) {
                body += `- [#${pr.number}](${pr.url}) ${pr.title} ${pr.user}\n`;
              }
            }
            if (contributors.size > 0) {
              body += '\n### Contributors\n';
              for (const [name, count] of contributors.entries()) {
                body += `- ${name} — ${count} commit(s)\n`;
              }
            }
            return { body };
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug release assets and planned tag
        run: |
          echo "Planned release tag: ${{ needs.preflight.outputs.release_tag }}"
          echo "Contents of release_assets:"
          find release_assets -maxdepth 5 -type f -print || true

      - name: Fail if no artifacts downloaded
        run: |
          set -euo pipefail
          cnt=$(find release_assets -type f | wc -l || true)
          echo "Found $cnt artifact file(s) in release_assets"
          if [ "$cnt" -eq 0 ]; then
            echo "No artifacts found to upload. Aborting release." >&2
            exit 1
          fi

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_assets/**/*.zip
            release_assets/**/*.tar.gz
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          name: Release ${{ needs.preflight.outputs.release_tag }}
          body: ${{ fromJson(steps.create_release.outputs.result).body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
